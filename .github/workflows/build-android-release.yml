name: Build Android APK Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    name: Build Android APK Release
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Build web app
        run: npm run build
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true
        
      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"
          
      - name: Add Android platform
        run: npx cap add android
        
      - name: Sync Capacitor
        run: npx cap sync android
        
      - name: Make Gradle executable
        run: chmod +x android/gradlew
        
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: GallOli ${{ github.ref_name }}
          body: |
            ## 🐔 GallOli Android App ${{ github.ref_name }}
            
            ### ✨ Características:
            - ✅ Gestión completa de ventas de pollos frescos
            - ✅ Control avanzado de créditos y pagos
            - ✅ Cálculo automático de merma diaria
            - ✅ Backup automático a Telegram (10 PM Ecuador)
            - ✅ Sincronización multi-dispositivo en tiempo real
            - ✅ Notificaciones push inteligentes
            - ✅ Modo offline completo
            - ✅ PWA instalable
            
            ### 📱 Instalación:
            1. Descarga el archivo `app-debug.apk`
            2. Habilita "Fuentes desconocidas" en Android
            3. Instala la aplicación
            4. ¡Disfruta de GallOli en tu móvil!
            
            ### 📋 Requisitos:
            - Android 7.0+ (API 24)
            - 50MB de espacio libre
            - Conexión a internet para sincronización
            
            ### 🆕 Novedades en esta versión:
            Ver commits desde la última versión para detalles específicos.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}