name: Build GallOli Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install TypeScript (required by Capacitor)
        run: npm install -D typescript --legacy-peer-deps

      - name: Install TypeScript (requerido por capacitor.config.ts)
        run: npm install -D typescript --legacy-peer-deps

      - name: Install Bluetooth LE plugin
        run: npm install @capacitor-community/bluetooth-le --legacy-peer-deps

      - name: Prepare www folder for Capacitor
        run: |
          mkdir -p www
          cp index.html www/
          cp -r css www/
          cp -r js www/
          cp -r icons www/
          cp manifest.json www/
          cp sw.js www/
          cp _headers www/ 2>/dev/null || true
          cp -r .well-known www/ 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Add Android platform
        run: npx cap add android || echo "Platform may already exist"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/GallOli.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GallOli-APK
          path: android/app/build/outputs/apk/debug/GallOli.apk
          retention-days: 30

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Telethon
        run: pip install telethon

      - name: Get app version
        id: version
        run: echo "APP_VERSION=$(grep -o 'APP_VERSION.*=.*' sw.js | head -1 | grep -o \"'[^']*'\" | head -1 | tr -d \"'\")" >> $GITHUB_OUTPUT

      - name: Send APK to Telegram
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          APP_VERSION: ${{ steps.version.outputs.APP_VERSION }}
        run: python .github/scripts/send_apk.py
