name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK with Capacitor
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install dependencies
        run: npm ci
        
      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android
          
      - name: Initialize Capacitor
        run: |
          if [ ! -f capacitor.config.ts ]; then
            npx cap init galloli com.galloli.app --web-dir .
          fi
          
      - name: Add Android platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          
      - name: Sync Capacitor
        run: npx cap sync android
        
      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: galloli-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: GallOli ${{ github.ref_name }}
          body: |
            ## GallOli Android App ${{ github.ref_name }}
            
            ### Características:
            - ✅ Gestión completa de ventas de pollos
            - ✅ Control de créditos y pagos
            - ✅ Cálculo automático de merma
            - ✅ Backup automático a Telegram
            - ✅ Sincronización multi-dispositivo
            - ✅ Notificaciones push
            - ✅ Modo offline
            
            ### Instalación:
            1. Descarga el archivo APK
            2. Habilita "Fuentes desconocidas" en Android
            3. Instala la aplicación
            
            ### Requisitos:
            - Android 7.0+ (API 24)
            - 50MB de espacio libre
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}