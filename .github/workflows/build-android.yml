name: Build GallOli Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install TypeScript (required by Capacitor)
        run: npm install -D typescript --legacy-peer-deps

      - name: Prepare www folder for Capacitor
        run: |
          mkdir -p www
          cp index.html www/
          cp -r css www/
          cp -r js www/
          cp -r icons www/
          cp manifest.json www/
          cp sw.js www/
          cp _headers www/ 2>/dev/null || true
          cp -r .well-known www/ 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Add Android platform
        run: npx cap add android || echo "Platform may already exist"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Inject Capacitor plugins (BLE + Push)
        run: |
          JAVA_DIR="android/app/src/main/java/store/ivapps/galloli"
          mkdir -p "$JAVA_DIR"
          cp .github/android-src/BlePlugin.java              "$JAVA_DIR/"
          cp .github/android-src/PushPlugin.java             "$JAVA_DIR/"
          cp .github/android-src/GalloliFirebaseService.java "$JAVA_DIR/"
          cp .github/android-src/MainActivity.java           "$JAVA_DIR/"
          echo "✅ Plugins inyectados:"
          ls -la "$JAVA_DIR/"

      - name: Patch AndroidManifest (BLE + Push permissions + FCM service)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # 1. Agregar permisos antes de <application
          sed -i 's|<application|<uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\n    <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\n    <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-feature android:name="android.hardware.bluetooth_le" android:required="false" />\n    <application|' "$MANIFEST"

          # 2. Agregar el servicio FCM antes de </application>
          sed -i 's|</application>|        <service android:name=".GalloliFirebaseService" android:exported="false">\n            <intent-filter>\n                <action android:name="com.google.firebase.MESSAGING_EVENT" />\n            </intent-filter>\n        </service>\n    </application>|' "$MANIFEST"

          echo "✅ AndroidManifest parcheado"

      - name: Add Firebase to build.gradle (app)
        run: |
          APP_GRADLE="android/app/build.gradle"

          # Agregar plugin de google-services al final del bloque plugins si existe, o al inicio del archivo
          if grep -q "apply plugin:" "$APP_GRADLE"; then
              echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
          else
              sed -i '1s/^/apply plugin: "com.google.gms.google-services"\n/' "$APP_GRADLE"
          fi

          # Agregar dependencias Firebase
          sed -i 's|dependencies {|dependencies {\n    implementation platform("com.google.firebase:firebase-bom:33.1.0")\n    implementation "com.google.firebase:firebase-messaging"|' "$APP_GRADLE"

          echo "✅ Firebase agregado a app/build.gradle"

      - name: Add google-services plugin to root build.gradle
        run: |
          ROOT_GRADLE="android/build.gradle"

          # Agregar classpath de google-services en buildscript/dependencies
          sed -i 's|classpath("com.android.tools.build:gradle|classpath("com.google.gms:google-services:4.4.2")\n        classpath("com.android.tools.build:gradle|' "$ROOT_GRADLE"

          echo "✅ google-services plugin agregado a build.gradle raíz"

      - name: Create google-services.json (sin Firebase real, solo para compilar)
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "galloli-app",
              "storage_bucket": "galloli-app.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                  "android_client_info": {
                    "package_name": "store.ivapps.galloli"
                  }
                },
                "oauth_client": [],
                "api_key": [{ "current_key": "placeholder_key" }],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF
          echo "✅ google-services.json creado"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/GallOli.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GallOli-APK
          path: android/app/build/outputs/apk/debug/GallOli.apk
          retention-days: 30

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Telethon
        run: pip install telethon

      - name: Get app version
        id: version
        run: echo "APP_VERSION=$(grep -o 'APP_VERSION.*=.*' sw.js | head -1 | grep -o \"'[^']*'\" | head -1 | tr -d \"'\")" >> $GITHUB_OUTPUT

      - name: Send APK to Telegram
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          APP_VERSION: ${{ steps.version.outputs.APP_VERSION }}
        run: python .github/scripts/send_apk.py
