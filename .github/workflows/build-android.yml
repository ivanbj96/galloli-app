name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm install --legacy-peer-deps
          echo "Dependencies installed successfully"

      - name: Build web app
        run: echo "Web app ready - using current directory as build output"

      - name: Verify Capacitor config
        run: |
          echo "Verifying Capacitor configuration..."
          cat capacitor.config.ts
          npx cap doctor || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'          # ⚠️ MUST be 21 for Capacitor 8

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Add Android platform
        run: |
          echo "Adding Android platform..."
          npx cap add android
          echo "Android platform added successfully"

      - name: Sync Capacitor
        run: |
          echo "Syncing Capacitor..."
          npx cap sync android
          echo "Capacitor sync completed"

      - name: Verify Android project
        run: |
          echo "Verifying Android project structure..."
          ls -la android/
          ls -la android/app/

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: galloli-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30