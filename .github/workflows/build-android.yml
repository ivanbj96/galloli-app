name: Build GallOli Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install TypeScript
        run: npm install -D typescript --legacy-peer-deps

      - name: Install BLE plugin
        run: npm install @capacitor-community/bluetooth-le --legacy-peer-deps

      - name: Bundle BleClient for vanilla JS
        run: |
          npm install -D esbuild --legacy-peer-deps
          npx esbuild js/ble-entry.js \
            --bundle \
            --format=iife \
            --global-name=__BleBundle \
            --outfile=js/ble-bundle.js \
            --platform=browser \
            --target=es2017
          echo "✅ ble-bundle.js generado"

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/
          cp -r css www/
          cp -r js www/
          cp -r icons www/
          cp manifest.json www/
          cp sw.js www/
          cp _headers www/ 2>/dev/null || true
          cp -r .well-known www/ 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Add Android platform
        run: npx cap add android || echo "Platform already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      # ── LOGO E ICONOS ──────────────────────────────────────────────────────
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generate app icons from GallOli logo
        run: |
          SRC="icons/favicon.pub/android-chrome-512x512.png"
          RES="android/app/src/main/res"

          for size in 48 72 96 144 192; do
            case $size in
              48)  density="mdpi"    ;;
              72)  density="hdpi"    ;;
              96)  density="xhdpi"   ;;
              144) density="xxhdpi"  ;;
              192) density="xxxhdpi" ;;
            esac
            mkdir -p "$RES/mipmap-$density"
            convert "$SRC" -resize ${size}x${size} "$RES/mipmap-$density/ic_launcher.png"
            convert "$SRC" -resize ${size}x${size} "$RES/mipmap-$density/ic_launcher_round.png"
          done

          # Foreground para adaptive icon
          mkdir -p "$RES/mipmap-xxxhdpi"
          convert "$SRC" -resize 432x432 -gravity center -extent 512x512 \
            "$RES/mipmap-xxxhdpi/ic_launcher_foreground.png"

          # Adaptive icon XML
          mkdir -p "$RES/mipmap-anydpi-v26"
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
    <background android:drawable="@color/ic_launcher_background"/>
    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
</adaptive-icon>
XMLEOF

          # Color de fondo
          mkdir -p "$RES/values"
          if grep -q "ic_launcher_background" "$RES/values/colors.xml" 2>/dev/null; then
            sed -i 's|<color name="ic_launcher_background">.*</color>|<color name="ic_launcher_background">#185a83</color>|' "$RES/values/colors.xml"
          else
            sed -i 's|</resources>|    <color name="ic_launcher_background">#185a83</color>\n</resources>|' "$RES/values/colors.xml" 2>/dev/null || \
            printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n    <color name="ic_launcher_background">#185a83</color>\n</resources>\n' > "$RES/values/colors.xml"
          fi
          echo "✅ Iconos generados"

      # ── SPLASH SCREEN ──────────────────────────────────────────────────────
      - name: Generate splash screens
        run: |
          SRC="icons/favicon.pub/android-chrome-512x512.png"
          RES="android/app/src/main/res"

          for config in "port-mdpi:320x480" "port-hdpi:480x800" "port-xhdpi:720x1280" "port-xxhdpi:960x1600" "port-xxxhdpi:1280x1920"; do
            density="${config%%:*}"
            dims="${config##*:}"
            w="${dims%%x*}"
            h="${dims##*x}"
            logo_size=$((w * 40 / 100))
            mkdir -p "$RES/drawable-$density"
            convert -size ${w}x${h} xc:"#185a83" \
              \( "$SRC" -resize ${logo_size}x${logo_size} \) \
              -gravity center -composite \
              "$RES/drawable-$density/splash.png"
          done
          echo "✅ Splash screens generados"

      # ── JAVA NATIVO ────────────────────────────────────────────────────────
      - name: Copy native Java files
        run: |
          JAVA_DIR="android/app/src/main/java/store/ivapps/galloli"
          mkdir -p "$JAVA_DIR"
          cp .github/android-src/BleForegroundPlugin.java  "$JAVA_DIR/"
          cp .github/android-src/BleForegroundService.java "$JAVA_DIR/"

          # Usar MainActivity con o sin Firebase según el secret
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            cp .github/android-src/MainActivityFcm.java "$JAVA_DIR/MainActivity.java"
            cp .github/android-src/GalloliFirebaseService.java "$JAVA_DIR/"
            echo "✅ MainActivity con Firebase"
          else
            cp .github/android-src/MainActivity.java "$JAVA_DIR/"
            echo "✅ MainActivity sin Firebase"
          fi
          ls -la "$JAVA_DIR"

      # ── FIREBASE / FCM (solo si el secret existe) ──────────────────────────
      - name: Setup Firebase FCM
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "⚠️ GOOGLE_SERVICES_JSON no configurado - saltando Firebase"
            exit 0
          fi

          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          echo "✅ google-services.json escrito"

          python3 .github/scripts/patch_firebase.py

      # ── PERMISOS ANDROID MANIFEST ──────────────────────────────────────────
      - name: Patch AndroidManifest
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Permisos BLE + Push
          sed -i '/<manifest/a\
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />\
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />\
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />\
              <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />\
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_CONNECTED_DEVICE" />\
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\
              <uses-feature android:name="android.hardware.bluetooth_le" android:required="false" />' \
            "$MANIFEST"

          # Registrar BleForegroundService
          sed -i '/<\/activity>/a\
              <service android:name=".BleForegroundService" android:enabled="true" android:exported="false" android:foregroundServiceType="connectedDevice" />' \
            "$MANIFEST"

          # Registrar GalloliFirebaseService solo si Firebase está configurado
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            sed -i '/<\/activity>/a\
              <service android:name=".GalloliFirebaseService" android:exported="false"><intent-filter><action android:name="com.google.firebase.MESSAGING_EVENT" \/><\/intent-filter><\/service>' \
              "$MANIFEST"
            echo "✅ Firebase service registrado en manifest"
          fi

          echo "✅ AndroidManifest parcheado"

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/GallOli.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GallOli-APK
          path: android/app/build/outputs/apk/debug/GallOli.apk
          retention-days: 30

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Telethon
        run: pip install telethon

      - name: Get app version
        id: version
        run: echo "APP_VERSION=$(grep -o 'APP_VERSION.*=.*' sw.js | head -1 | grep -o \"'[^']*'\" | head -1 | tr -d \"'\")" >> $GITHUB_OUTPUT

      - name: Send APK to Telegram
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          APP_VERSION: ${{ steps.version.outputs.APP_VERSION }}
        run: python .github/scripts/send_apk.py
