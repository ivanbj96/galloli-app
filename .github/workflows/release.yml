name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create GitHub Release
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: GallOli ${{ steps.version.outputs.VERSION }}
          body: |
            ## 🐔 GallOli ${{ steps.version.outputs.VERSION }}
            
            ### ✨ Nuevas características y mejoras
            
            - Gestión completa de ventas de pollos frescos
            - Control avanzado de créditos y pagos
            - Cálculo automático de merma diaria
            - Backup automático a Telegram (10 PM Ecuador)
            - Sincronización multi-dispositivo en tiempo real
            - Notificaciones push inteligentes
            - Modo offline completo
            - PWA instalable
            
            ### 📱 Descargas disponibles
            
            - **Web App**: [galloli.pages.dev](https://galloli.pages.dev)
            - **Android APK**: Se generará automáticamente
            
            ### 🔧 Instalación Web
            
            1. Visita [galloli.pages.dev](https://galloli.pages.dev)
            2. Haz clic en "Instalar" cuando aparezca el prompt
            3. ¡Listo! Ya tienes GallOli en tu dispositivo
            
            ### 📋 Requisitos
            
            - **Web**: Navegador moderno (Chrome, Firefox, Safari, Edge)
            - **Android**: Android 7.0+ (API 24)
            - **Espacio**: ~10MB
            
            ### 🆕 Changelog
            
            Ver commits desde la última versión para detalles específicos.
            
            ---
            
            **¿Problemas?** Reporta issues en GitHub
            **¿Sugerencias?** ¡Nos encanta escuchar feedback!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}