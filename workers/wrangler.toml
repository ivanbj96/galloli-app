name = "galloli-sync"
main = "index.js"
compatibility_date = "2024-01-22"

# Variables de entorno
[vars]
ENVIRONMENT = "production"

# Base de datos D1
[[d1_databases]]
binding = "DB"
database_name = "galloli"
database_id = "c5dd06b9-2998-49d5-834e-fd0d5f7f8da1"

# Durable Objects
[[durable_objects.bindings]]
name = "SESSION_MANAGER"
class_name = "SessionManager"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionManager"]

# Cron Triggers (hora Ecuador = UTC-5)
# 10 PM Ecuador = 03:00 UTC → backup + push noche
# 8 AM Ecuador  = 13:00 UTC → push créditos mañana
# 12 PM Ecuador = 17:00 UTC → push merma mediodía
# 6 PM Ecuador  = 23:00 UTC → push merma tarde
[triggers]
crons = ["0 3 * * *", "0 13 * * *", "0 17 * * *", "0 23 * * *"]